server {
  listen 80;

  # API calls go to the app container; trailing slash on proxy_pass strips /api.
  location /api/ {
    proxy_pass http://app:8000/;
  }

  # SPA: serve files, fall back to index.html so client-side routes work.
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
