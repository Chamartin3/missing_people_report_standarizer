name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright
      - run: lint-imports
      - run: pytest
