# Fully dockerized: pgvector DB + app. `docker compose up` works with zero host setup.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: facefinder
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d facefinder"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5433:5432" # host 5433 → container 5432 (avoids a local postgres on 5432)

  app:
    build: .
    environment:
      # settings.py composes the URL from DATABASE_* parts — only the host
      # differs from the defaults (it's the `db` service, not localhost).
      DATABASE_HOST: db
      AUTH_JWT_SECRET: dev-secret-change-me-min-32-chars!
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app # live code for `compose run`; app deps are baked into the image
      - ./storage:/app/storage # bytes survive container restarts
      - ./sample_images:/app/sample_images:ro
    # serves the API on 8000 (internal — the web container proxies to it).
    # `docker compose run --rm app <cmd>` still overrides this for scripts/tests.
    command: ["uvicorn", "facefinder.main:app", "--host", "0.0.0.0", "--port", "8000"]

  web:
    build:
      context: ./web
      args:
        VITE_API: /api # same-origin: nginx proxies /api → app:8000
    ports:
      - "8080:80" # open http://localhost:8080
    depends_on:
      - app

volumes:
  dbdata:
